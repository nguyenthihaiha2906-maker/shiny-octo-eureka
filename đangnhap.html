<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Bride - Đăng Nhập</title>
    <link href="styles/default7.css" type="text/css" rel="stylesheet"/>
</head>
<body class="auth-body">

    <div id="draggable-back-btn" class="floating-back-btn" onclick="goToHome(event)" title="Quay về trang chủ">
        <span>←</span>
    </div>

    <div class="auth-wrapper">
        <div class="form-box">

            <div class="logo">
                <h1>Luxury Bride</h1>
                <div class="divider-line"></div>
                <p>Vẻ đẹp hoàn hảo cho ngày trọng đại</p>
            </div>

            <h2>Đăng Nhập Không Gian Riêng</h2>

            <form id="loginForm" novalidate>
                <div class="input-group">
                    <input type="text" id="username" required placeholder=" ">
                    <label for="username">Email hoặc Số điện thoại</label>
                    <span class="error-msg" id="userError"></span>
                </div>

                <div class="input-group">
                    <input type="password" id="password" required placeholder=" ">
                    <label for="password">Mật khẩu</label>
                    <span class="error-msg" id="passError"></span>
                </div>

                <button type="submit" class="btn-auth">Đăng Nhập</button>
            </form>

            <p id="thongbao"></p>

            <div class="switch-page">
                Chưa có tài khoản thành viên? <a href="đăngkys.html">Đăng ký ngay tại đây</a>
            </div>
            
            <div class="back-home-link">
    <a href="lienhe.html">
        <span class="icon-heart">&nbsp;</span> Quay về Trang Chủ
    </a>
</div>
        </div>
    </div>

    <script src="scrite/taitrang5.js" type="text/javascript"></script>
</body>
</html>
