<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Bride - Đăng Ký Tài Khoản</title>
    <link href="styles/default3.css" type="text/css" rel="stylesheet"/>
    <script src="scrite/taitrang2.js" type="text/javascript"></script>
    
    <style>
        .error-msg {
            color: #ff4d4d;
            font-size: 12px;
            display: block;
            margin-top: 4px;
            text-align: left;
        }
        /* CSS cho phần thông báo thành công mượt mà */
        #thongbao {
            text-align: center;
            margin-top: 20px;
            font-size: 14.5px;
            font-weight: 500;
            line-height: 1.6;
            transition: all 0.4s ease;
        }
        .success-text {
            color: #2e7d32; /* Màu xanh lá quý phái dịu mắt */
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="auth-body">

    <div id="draggable-back-btn" class="floating-back-btn" title="Quay về trang chủ" onclick="window.location.href='trangchu.html';" style="cursor: pointer;">
        <span>←</span>
    </div>

    <div class="auth-wrapper">
        <div class="form-box">

            <div class="logo">
                <h1>Luxury Bride</h1>
                <div class="divider-line"></div>
                <p>Vẻ đẹp hoàn hảo cho ngày trọng đại</p>
            </div>

            <h2>Đăng Ký Tài Khoản</h2>

            <form id="registerForm" onsubmit="return false;">
                
                <div class="input-group">
                    <input type="text" id="fullname" required placeholder=" ">
                    <label for="fullname">Họ và tên của Nàng</label>
                    <span class="error-msg" id="nameError"></span>
                </div>

                <div class="input-group">
                    <input type="email" id="email" required placeholder=" ">
                    <label for="email">Địa chỉ Email</label>
                    <span class="error-msg" id="emailError"></span>
                </div>

                <div class="input-group">
                    <input type="tel" id="phone" required pattern="[0-9]{10,11}" placeholder=" ">
                    <label for="phone">Số điện thoại</label>
                    <span class="error-msg" id="phoneError"></span>
                </div>

                <div class="input-group">
                    <input type="password" id="password" required minlength="6" placeholder=" ">
                    <label for="password">Mật khẩu (Tối thiểu 6 ký tự)</label>
                    <span class="error-msg" id="passwordError"></span>
                </div>

                <div class="input-group">
                    <input type="password" id="re-password" required placeholder=" ">
                    <label for="re-password">Xác nhận lại mật khẩu</label>
                    <span class="error-msg" id="rePasswordError"></span>
                </div>

                <button type="submit" class="btn-auth" id="submitBtn">Tạo Tài Khoản</button>
            </form>

            <p id="thongbao"></p>

            <div class="switch-page">
                Đã có không gian riêng? <a href="đangnhap.html">Đăng nhập tại đây</a>
            </div>

        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(event) {
            // Xóa toàn bộ thông báo lỗi cũ
            document.getElementById('nameError').innerText = "";
            document.getElementById('emailError').innerText = "";
            document.getElementById('phoneError').innerText = "";
            document.getElementById('passwordError').innerText = "";
            document.getElementById('rePasswordError').innerText = "";
            
            let isValid = true;

            // 1. Kiểm tra họ tên
            const fullname = document.getElementById('fullname').value.trim();
            if (fullname.length < 2) {
                document.getElementById('nameError').innerText = "Tên của Nàng không được để trống nha.";
                isValid = false;
            }

            // 2. Kiểm tra số điện thoại
            const phone = document.getElementById('phone').value.trim();
            const phoneRegex = /^[0-9]{10,11}$/;
            if (!phoneRegex.test(phone)) {
                document.getElementById('phoneError').innerText = "Số điện thoại phải chứa từ 10 đến 11 chữ số nha Nàng.";
                isValid = false;
            }

            // 3. Kiểm tra độ dài mật khẩu
            const password = document.getElementById('password').value;
            if (password.length < 6) {
                document.getElementById('passwordError').innerText = "Mật khẩu phải từ 6 ký tự trở lên nè.";
                isValid = false;
            }

            // 4. Kiểm tra mật khẩu nhập lại
            const rePassword = document.getElementById('re-password').value;
            if (password !== rePassword) {
                document.getElementById('rePasswordError').innerText = "Mật khẩu xác nhận chưa trùng khớp rồi Nàng ơi.";
                isValid = false;
            }

            // Xử lý khi mọi thứ hợp lệ
            if (isValid) {
                const thongBaoKhung = document.getElementById('thongbao');
                const submitBtn = document.getElementById('submitBtn');

                // Vô hiệu hóa nút bấm để tránh người dùng nhấn liên tục
                submitBtn.disabled = true;
                submitBtn.innerText = "Đang xử lý...";

                // Hiển thị dòng chữ thông báo ngọt ngào ra màn hình
                thongBaoKhung.className = "success-text";
                thongBaoKhung.innerHTML = "✨ Đăng ký thành công! <br> Đợi một chút, chúng tôi sẽ chuyển sang phần đăng nhập cho bạn...";

                // Kích hoạt tự động chuyển sang trang đăng nhập sau 3 giây (3000ms)
                setTimeout(function() {
                    window.location.href = "đangnhap.html"; 
                }, 3000);
            }
        });
    </script>
</body>
</html>
